spring:
  application:
    name: payment-order-service

  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/paymentdb}
    username: ${SPRING_R2DBC_USERNAME:admin}
    password: ${SPRING_R2DBC_PASSWORD:admin}
    pool:
      initial-size: 5
      max-size: 20

  flyway:
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/paymentdb}
    user: ${SPRING_FLYWAY_USER:admin}
    password: ${SPRING_FLYWAY_PASSWORD:admin}
    enabled: ${SPRING_FLYWAY_ENABLED:true}

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
