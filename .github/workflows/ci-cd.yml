name: Hexagonal Architecture CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  validate-architecture:
    name: Build & Validate Hexagonal Architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Verify Environment & Resolve Dependencies
        run: |
          java -version
          mvn -version
          mvn dependency:go-offline

      # Layer 1: Domain & Application
      - name: Test Core Layers (Domain & Application)
        run: >
          mvn test 
          -Dtest="com.hiberus.payment.domain.**,com.hiberus.payment.application.**" 
          -DfailIfNoTests=false
        
      # Layer 2: Infrastructure
      - name: Test Adapters Layer (Infrastructure & DB Integration)
        run: >
          mvn test 
          -Dtest="com.hiberus.payment.infrastructure.**" 
          -DfailIfNoTests=false
        
      # Quality Assurance Stage
      - name: Run Quality Gates (JaCoCo, Checkstyle, SpotBugs, SonarQube)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # We run verify skipping tests to only trigger the reporting/linting plugins based on previous test runs
        run: mvn verify sonar:sonar -DskipTests -Dsonar.projectKey=hiberus-payment-api
        
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  deploy:
    name: Build & Deploy Application
    runs-on: ubuntu-latest
    needs: validate-architecture
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Build Final Executable (Skip Tests)
        run: mvn clean package -DskipTests
        
      - name: Build Docker Container Image
        run: docker build -t hiberus-payment-api:${{ github.sha }} .
        
      - name: Authenticate to Container Registry (Placeholder)
        # Uncomment and configure with appropriate registry secrets
        # run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
        run: echo "Mock login to registry..."

      - name: Push Image and Trigger Deployment (Placeholder)
        run: |
          echo "Simulating image push: hiberus-payment-api:${{ github.sha }}"
          echo "Simulating server deployment..."
