name: Hexagonal Architecture CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  validate-architecture:
    name: Build & Validate Hexagonal Architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Verify Environment & Resolve Dependencies
        run: |
          java -version
          mvn -version
          mvn dependency:go-offline

      # Layer 1: Domain & Application
      - name: Test Core Layers (Domain & Application)
        run: >
          mvn test 
          -Dtest="com.hiberus.payment.domain.**,com.hiberus.payment.application.**" 
          -DfailIfNoTests=false
        
      # Layer 2: Infrastructure
      - name: Test Adapters Layer (Infrastructure & DB Integration)
        run: >
          mvn test 
          -Dtest="com.hiberus.payment.infrastructure.**" 
          -DfailIfNoTests=false
        
      # Quality Assurance Stage
      - name: Run Quality Gates (JaCoCo, Checkstyle, SpotBugs, SonarQube)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # We run verify skipping tests to only trigger the reporting/linting plugins based on previous test runs
        run: mvn verify -DskipTests
        
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  validate-config:
    name: Validate Application Configuration
    runs-on: ubuntu-latest
    needs: validate-architecture
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Verify configuration templates exist
        run: |
          echo "Verificando que las plantillas de configuración están presentes..."
          if [ ! -f "src/main/resources/application.yml.template" ]; then
            echo "ERROR: src/main/resources/application.yml.template no encontrado."
            exit 1
          fi
          if [ ! -f "src/test/resources/application.yml" ]; then
            echo "ERROR: src/test/resources/application.yml no encontrado."
            exit 1
          fi
          echo "✅ Plantillas de configuración verificadas correctamente."

      - name: Generate application.yml from GitHub Secrets
        env:
          SPRING_R2DBC_URL: ${{ secrets.SPRING_R2DBC_URL }}
          SPRING_R2DBC_USERNAME: ${{ secrets.SPRING_R2DBC_USERNAME }}
          SPRING_R2DBC_PASSWORD: ${{ secrets.SPRING_R2DBC_PASSWORD }}
          SPRING_FLYWAY_URL: ${{ secrets.SPRING_FLYWAY_URL }}
          SPRING_FLYWAY_USER: ${{ secrets.SPRING_FLYWAY_USER }}
          SPRING_FLYWAY_PASSWORD: ${{ secrets.SPRING_FLYWAY_PASSWORD }}
        run: |
          echo "Generando application.yml desde secretos de GitHub..."
          cat > src/main/resources/application.yml <<EOF
          spring:
            application:
              name: payment-order-service
            r2dbc:
              url: ${SPRING_R2DBC_URL}
              username: ${SPRING_R2DBC_USERNAME}
              password: ${SPRING_R2DBC_PASSWORD}
            flyway:
              url: ${SPRING_FLYWAY_URL}
              user: ${SPRING_FLYWAY_USER}
              password: ${SPRING_FLYWAY_PASSWORD}
              enabled: true
          server:
            port: 8080
          EOF
          echo "✅ application.yml generado correctamente."

      - name: Validate YAML Syntax
        run: |
          pip install pyyaml --quiet
          python3 -c "
          import yaml, sys
          files = [
            'src/main/resources/application.yml',
            'src/test/resources/application.yml',
          ]
          for f in files:
            try:
              with open(f, 'r') as fp:
                yaml.safe_load(fp)
              print(f'✅ YAML válido: {f}')
            except yaml.YAMLError as e:
              print(f'❌ YAML inválido en {f}: {e}')
              sys.exit(1)
          "

      - name: Verify no hardcoded credentials in source
        run: |
          echo "Verificando que no hay credenciales hardcodeadas en el código fuente..."
          FORBIDDEN_PATTERNS=("password:" "secret:" "api_key:" "private_key:")
          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            if git grep -r --include="*.java" -l "$pattern" src/main/ 2>/dev/null; then
              echo "ADVERTENCIA: Patrón sospechoso '$pattern' encontrado en código fuente Java."
            fi
          done
          echo "✅ Verificación de credenciales completada."

  deploy:
    name: Build & Deploy Application
    runs-on: ubuntu-latest
    needs: [validate-architecture, validate-config]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Final Executable (Skip Tests)
        run: mvn clean package -DskipTests

      - name: Build Docker Container Image
        run: |
          docker build -f Dockerfile.template \
            -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hiberus-payment/hiberus-payment-api:${{ github.sha }} \
            -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hiberus-payment/hiberus-payment-api:latest \
            .

      - name: Push Image to Artifact Registry
        run: |
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hiberus-payment/hiberus-payment-api:${{ github.sha }}
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hiberus-payment/hiberus-payment-api:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"

      - name: Terraform Plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ secrets.GCP_REGION }}" \
            -var="app_image=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hiberus-payment/hiberus-payment-api:${{ github.sha }}" \
            -var="tf_state_bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve tfplan

      - name: Show Service URL
        working-directory: infrastructure/terraform
        run: |
          SERVICE_URL=$(terraform output -raw cloud_run_url)
          echo "✅ API desplegada en: $SERVICE_URL"
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV
