name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  validate-versions:
    name: Validar Versiones
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Verificar versión de Java, Maven y SO
        run: |
          java -version
          mvn -version
          uname -a
          
      - name: Verificar dependencias (Fail on Vulnerabilities)
        # Opcional: Podrías usar un plugin de OWASP o simplemente validar que el árbol de dependencias resuelva bien.
        run: mvn dependency:tree -Ddetail=true

  validate-code:
    name: Validar Código (Tests y QA Gate)
    runs-on: ubuntu-latest
    needs: validate-versions # Depende del éxito de la validación de versiones
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Compilar y Ejecutar Pruebas (Testcontainers)
        # mvn clean verify ejecuta JUnit, JaCoCo, SpotBugs y Checkstyle
        # Necesita que Docker esté disponible si usa Testcontainers (GitHub Actions lo tiene por defecto)
        run: mvn clean verify
        
      - name: Análisis de Calidad y Seguridad (SonarQube)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Para comentar en PRs
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # Token de proyecto en SonarQube/SonarCloud
        run: mvn sonar:sonar -Dsonar.projectKey=hiberus-payment-api
        
      - name: Confirmar Cobertura (Opcional - Subir reporte)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate-code # Depende de que el código pase el QA gate
    # Solo hacer deploy si estamos integrando a main/master
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Compilar artefacto final (Saltando tests)
        run: mvn clean package -DskipTests
        
      - name: Construir Imagen Docker
        run: docker build -t hiberus-payment-api:${{ github.sha }} .
        
      - name: Autenticación en Container Registry (Ejemplo)
        # Aquí descomentarías y pondrías tus secretos para ECR, DockerHub, etc.
        # run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
        run: echo "Mock login to registry..."

      - name: Push Image y Deploy al Servidor
        # Aquí van tus comandos de despliegue web, subida de la imagen, o trigger a ArgoCD/K8s
        run: |
          echo "Simulando push de la imagen hiberus-payment-api:${{ github.sha }}"
          echo "Simulando despliegue de la recien creada imagen en EC2/Render/Railway..."
