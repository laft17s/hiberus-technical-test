version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: payment_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: paymentdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d paymentdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment_api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=paymentdb
      - DB_USER=admin
      - DB_PASSWORD=admin
      - TZ=America/Guayaquil

volumes:
  postgres_data:
